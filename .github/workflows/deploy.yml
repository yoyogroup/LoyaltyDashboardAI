name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish static files to gh-pages
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Build gh-pages INCREMENTALLY on top of its existing history using a
          # worktree — no orphan branch, no --force. The previous orphan+force
          # approach intermittently failed with GitHub's "fatal error in
          # commit_refs" because it replaced the whole history on every deploy.
          git fetch origin gh-pages || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add -B gh-pages /tmp/ghp origin/gh-pages
          else
            git worktree add --orphan -b gh-pages /tmp/ghp   # first-ever deploy
          fi

          # Refresh the published files (backend/ is intentionally excluded —
          # it's deployed via SAM, not Pages).
          rm -rf /tmp/ghp/assets /tmp/ghp/index.html /tmp/ghp/login.html
          cp index.html login.html /tmp/ghp/
          cp -r assets /tmp/ghp/

          cd /tmp/ghp
          git add index.html login.html assets/
          if git diff --staged --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git commit -m "deploy: update GitHub Pages $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin gh-pages
