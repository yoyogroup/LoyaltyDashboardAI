name: Deploy to AWS Amplify

on:
  push:
    branches: [main]
    paths-ignore:
      - 'backend/**'
      - '.kiro/**'
      - '*.md'
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: eu-west-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package frontend
        run: |
          # Create a zip containing only the static frontend files
          zip -r site.zip index.html login.html assets/ \
            --exclude "assets/.DS_Store"

      - name: Deploy to Amplify
        id: deploy
        run: |
          set -e

          APP_ID="${{ secrets.AMPLIFY_APP_ID }}"
          BRANCH="main"

          # Create a new deployment and get the upload URL + job ID
          DEPLOYMENT=$(aws amplify create-deployment \
            --app-id "$APP_ID" \
            --branch-name "$BRANCH" \
            --output json)

          JOB_ID=$(echo "$DEPLOYMENT" | jq -r '.jobId')
          UPLOAD_URL=$(echo "$DEPLOYMENT" | jq -r '.zipUploadUrl')

          echo "Job ID: $JOB_ID"
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"

          # Upload the zip to the pre-signed S3 URL
          curl --fail --silent --show-error \
            -H "Content-Type: application/zip" \
            --upload-file site.zip \
            "$UPLOAD_URL"

          # Start the deployment
          aws amplify start-deployment \
            --app-id "$APP_ID" \
            --branch-name "$BRANCH" \
            --job-id "$JOB_ID"

          echo "✅ Deployment started (job $JOB_ID)"

      - name: Wait for deployment to complete
        run: |
          set -e

          APP_ID="${{ secrets.AMPLIFY_APP_ID }}"
          BRANCH="main"
          JOB_ID="${{ steps.deploy.outputs.job_id }}"

          echo "Waiting for job $JOB_ID to complete..."

          # Poll until the job finishes (timeout after 3 minutes)
          for i in $(seq 1 36); do
            STATUS=$(aws amplify get-job \
              --app-id "$APP_ID" \
              --branch-name "$BRANCH" \
              --job-id "$JOB_ID" \
              --query 'job.summary.status' \
              --output text 2>/dev/null || echo "PENDING")

            echo "  [$i] Status: $STATUS"

            if [ "$STATUS" = "SUCCEED" ]; then
              echo "✅ Deployment complete"
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "❌ Deployment failed with status: $STATUS"
              exit 1
            fi

            sleep 5
          done

          echo "⏱️ Timed out waiting for deployment"
          exit 1
